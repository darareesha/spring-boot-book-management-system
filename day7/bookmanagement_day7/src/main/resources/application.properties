spring.application.name=day7-docker-cicd
spring.datasource.url=jdbc:mysql://localhost:3306/bookmanagement_day7
spring.datasource.username=root
spring.datasource.password=Root.4321
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

management.endpoints.web.exposure.include=health,info,metrics

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=book-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.profiles.active=dev

#---
spring.config.activate.on-profile=dev
server.port=8080
spring.application.name=bookmanagement_day7-DEV

#---
spring.config.activate.on-profile=prod
server.port=9090
spring.application.name=bookmanagement_day7-PROD

#---
spring.config.activate.on-profile=staging
server.port=8085
spring.application.name=bookmanagement_day7-STAGING